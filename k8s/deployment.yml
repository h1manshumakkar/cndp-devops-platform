apiVersion: apps/v1
kind: Deployment
metadata:
  name: cndp-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cndp-api
  template:
    metadata:
      labels:
        app: cndp-api
    spec:
      containers:
      - name: cndp-api
        image: cndpacr12345.azurecr.io/cndp-api:153adb32ca1bd58aa93abc45b8e0fca6545027b5
        ports:
        - containerPort: 5000