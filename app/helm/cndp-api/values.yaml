appName: cndp-api

replicaCount: 2

image:
  repository: cndpacr12345.azurecr.io/cndp-api
  tag: latest

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "250m"

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

serviceAccount:
  create: true
  name: cndp-api

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2

httpRoute:
  enabled: false

