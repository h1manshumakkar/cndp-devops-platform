name: Build, Push and Deploy to AKS

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Docker Buildx (needed for ARM64)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Azure login
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 4. Login to ACR
    - name: Login to ACR
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 5. Build & Push Docker image (ARM64)
    - name: Build and Push Image
      uses: docker/build-push-action@v5
      with:
        context: ./app
        push: true
        tags: ${{ secrets.ACR_LOGIN_SERVER }}/cndp-api:latest
        platforms: linux/arm64

    # 6. Get AKS credentials
    - name: Get AKS credentials
      run: |
        az aks get-credentials \
          --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
          --name ${{ secrets.AKS_CLUSTER_NAME }} \
          --overwrite-existing
      

    - name: Debug directory
      run: |
          pwd
          ls -R

    # 7. Deploy to AKS
    # - name: Deploy to Kubernetes
    #   run: |
    #     kubectl apply -f k8s/deployment.yml
    #     kubectl apply -f k8s/service.yml

    # 8. Deploy to AKS using Helm
    - name: Deploy with Helm
      run: |
          helm upgrade --install cndp-api ./app/helm/cndp-api --set image.tag=${{ github.sha }}    

    # # 8. Restart rollout (force update)
    # - name: Restart deployment
    #   run: |
    #     kubectl rollout restart deployment cndp-api

    # 9. Verify deployment
    # - name: Check status
    #   run: |
    #     kubectl rollout status deployment cndp-api
    #9. Using Helm
    - name: Check Helm release status
      run: |
        helm status cndp-api
